<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#05020a">
<meta name="color-scheme" content="dark">
<title>Masq</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Cinzel+Decorative:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #05020a; }
  #root { height: 100%; }
  a { color: #e6cb7e; }
  a:hover { color: #f4d78c; }
  @keyframes imp-spot { 0%,100% { transform: translateX(-14px) rotate(-3deg); opacity:.85 } 50% { transform: translateX(14px) rotate(3deg); opacity:1 } }
  @keyframes imp-float { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-7px) } }
  @keyframes imp-tilt { 0%,100% { transform: rotate(-4deg) } 50% { transform: rotate(4deg) } }
  @keyframes imp-shimmer { 0% { background-position: -180% 0 } 100% { background-position: 280% 0 } }
  @keyframes imp-rise { from { opacity:0; transform: translateY(14px) } to { opacity:1; transform: translateY(0) } }
  @keyframes imp-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(200,162,76,.45) } 50% { box-shadow: 0 0 0 8px rgba(200,162,76,0) } }
  @keyframes imp-slide-up { from { opacity:0; transform: translateY(60px) } to { opacity:1; transform: translateY(0) } }
  @keyframes imp-slide-in { from { opacity:0 } to { opacity:1 } }
  @keyframes imp-fade-in { from { opacity:0 } to { opacity:1 } }
  @keyframes imp-scale-in { from { opacity:0; transform: scale(.94) } to { opacity:1; transform: scale(1) } }
  @keyframes imp-backdrop { from { opacity:0 } to { opacity:1 } }
  .imp-btn { transition: transform .12s ease, opacity .12s ease; }
  .imp-btn:active { transform: scale(.95); opacity:.82; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"></script>
<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
